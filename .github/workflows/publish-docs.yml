name: Publish Docs

# Only run after Tauri CI completes successfully on the main branch
on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Tauri CI"]
    branches: [main]
    types: [completed]

# Allow writing to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  mutation-report:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Publish mutation report to Stryker Dashboard
        run: npm run test:mutation
        env:
          STRYKER_DASHBOARD_API_KEY: ${{ vars.STRYKER_DASHBOARD_API_KEY }}

  build-and-deploy:
    # Allow manual publish; for workflow_run only continue after successful push-based CI.
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') }}
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      # ── Frontend/docs toolchain ───────────────────────────────────────────
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      # ── Rust docs ────────────────────────────────────────────────────────
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies and build outputs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: tauri-docs-${{ runner.os }}

      - name: Install Linux audio/GUI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libglib2.0-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libudev-dev

      - name: Generate Rust docs
        run: npm run docs:generateRustDocs

      # ── Frontend docs ────────────────────────────────────────────────────

      - name: Generate React/TypeDoc docs
        run: npm run docs:generateReactDocs

      # ── VitePress site ───────────────────────────────────────────────────
      - name: Build VitePress site
        run: npm run docs:build

      # ── Deploy ───────────────────────────────────────────────────────────
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

