name: Tauri CI

on:
  push:
    branches: [ main, ci-test ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Expose the branch name so publish-docs.yml can filter on it
run-name: "CI on ${{ github.ref_name }}"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libglib2.0-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libudev-dev

      - name: Install Node
        uses: actions/setup-node@v4
          #with:
          #  node-version: 22
        #cache: 'npm'
        #cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies and build outputs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: tauri-ci-${{ runner.os }}

      - name: Run ESLint (static analysis)
        run: npm run lint

      - name: Run Rust format check
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Run Rust Clippy (static analysis)
        working-directory: src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run React/Vitest tests
        run: npm run test -- --run

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test --verbose

      - name: Build Tauri
        run: npm run tauri build  -- --no-bundle
